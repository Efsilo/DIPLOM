version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: diploma_db
      POSTGRES_USER: diploma_user
      POSTGRES_PASSWORD: diploma_password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://diploma_user:diploma_password@db:5432/diploma_db

  celery:
    build: .
    command: celery -A netology_pd_diplom worker -l info
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
    environment:
      DATABASE_URL: postgres://diploma_user:diploma_password@db:5432/diploma_db

volumes:
  postgres_data: